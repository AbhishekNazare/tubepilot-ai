services:
  postgres:
    image: postgres:16-alpine
    container_name: tubepilot-postgres
    environment:
      POSTGRES_DB: tubepilot
      POSTGRES_USER: tubepilot
      POSTGRES_PASSWORD: tubepilot
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tubepilot -d tubepilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: tubepilot-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-storage:/qdrant/storage

volumes:
  postgres-data:
  qdrant-storage:

